services:
  backend:
    build: 
      context: ./backend
      target: prod
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/job_helper
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - LOCAL_AI_URL=http://ollama:11434/api/generate
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    depends_on:
      - db
      - ollama
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    # Auto-pull mistral on start
    entrypoint: /bin/sh -c "(ollama serve &) && sleep 5 && ollama pull mistral && wait"

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_helper
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  ollama: